"$schema" = "https://starship.rs/config-schema.json"

palette = "gruvbox_dark"

format = """
[](color_orange)\
[󰮯 󰊠 ](bg:color_orange fg:color_fg0)\
[](bg:color_yellow fg:color_orange)\
$directory\
[](bg:color_aqua fg:color_yellow)\
$git_branch\
$git_status\
[](bg:color_blue fg:color_aqua)\
$c\
$rust\
$nodejs\
$bun\
$php\
$java\
$python\
[](bg:color_bg3 fg:color_blue)\
$docker_context\
[](bg:color_bg1 fg:color_bg3)\
$cmd_duration\
[ ](fg:color_bg1)
$line_break$character"""

# [username]
# show_always = true
# style_user = "bg:color_orange fg:color_fg0"
# style_root = "bg:color_orange fg:color_fg0"
# format = '[ $user]($style)'

[directory]
style = "bg:color_yellow fg:color_fg0"
format = "[ $path ]($style)"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Systems" = "󰲋 "
"Videos" = " "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](bg:color_aqua fg:color_fg0)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](bg:color_aqua fg:color_fg0)]($style)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

[bun]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

[java]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

[docker_context]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](bg:color_aqua fg:color_fgo)]($style)'

# [time]
# disabled = false
# time_format = "%R"
# style = "bg:color_bg1"
# format = '[[  $time ](bg:color_bg1 fg:color_fg0)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[[󰄛](color_fg0) ❯](bold fg:color_fg0)'
error_symbol = '[[󰄛](color_red) ❯](bold fg:color_red)'
vimcmd_symbol = '[󰄛 ❮](bold fg:color_green)'
vimcmd_replace_one_symbol = '[󰄛 ❮](bold fg:color_purple)'
vimcmd_replace_symbol = '[󰄛 ❮](bold fg:color_purple)'
vimcmd_visual_symbol = '[󰄛 ❮](bold fg:color_yellow)'

[cmd_duration]
min_time = 0
show_milliseconds = true
format = "[ $duration]($style)"
style = "bg:color_bg1 fg:color_fg0"

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'
