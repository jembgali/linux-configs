# Basic Settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g mouse on
set -g set-clipboard on

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Split windows (opens in same directory as current pane)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config 
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf

# Alt+hjkl to switch panes without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Shift+arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt-number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Vim style copying
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Catppuccin Mocha theme 
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"

# Colors
thm_rosewater="#f5e0dc"
thm_flamingo="#f2cdcd"
thm_pink="#f5c2e7"
thm_mauve="#cba6f7"
thm_red="#f38ba8"
thm_maroon="#eba0ac"
thm_peach="#fab387"
thm_yellow="#f9e2af"
thm_green="#a6e3a1"
thm_teal="#94e2d5"
thm_sky="#89dceb"
thm_sapphire="#74c7ec"
thm_blue="#89b4fa"
thm_lavender="#b4befe"

# Surfaces and overlays
thm_subtext_1="#a6adc8"
thm_subtext_0="#bac2de"
thm_overlay_2="#9399b2"
thm_overlay_1="#7f849c"
thm_overlay_0="#6c7086"
thm_surface_2="#585b70"
thm_surface_1="#45475a"
thm_surface_0="#313244"
thm_mantle="#181825"
thm_crust="#11111b"

# Status Bar Settings
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Panes
set -g pane-border-style "fg=${thm_crust}"
set -g pane-active-border-style "fg=${thm_pink}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg}"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg}"

# Messages
set -g message-style "fg=${thm_pink},bg=${thm_surface_2},align=centre"
set -g message-command-style "fg=${thm_pink},bg=${thm_surface_2},align=centre"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_pink},bg=${thm_bg}] #I: #[fg=${thm_pink},bg=${thm_bg}](✓) #[fg=${thm_blue},bg=${thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-1 | rev) #[fg=${thm_pink},bg=${thm_bg}]"

# Statusline - non-active window
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}]#W"

# Statusline - right side 
set -g status-right "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics] #[fg=${thm_fg},bg=${thm_surface_0}] #W #{?client_prefix,#[fg=${thm_pink}],#[fg=${thm_mauve}]}#[bg=${thm_surface_0}]#{?client_prefix,#[bg=${thm_pink}],#[bg=${thm_mauve}]}#[fg=${thm_bg}] #[fg=${thm_fg},bg=${thm_surface_0}] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue},bg=${thm_overlay_2},bold"
